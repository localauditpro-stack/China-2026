<svg viewBox="0 0 180 252" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg_cipher-sar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#263238"/>
      <stop offset="100%" stop-color="#37474F"/>
    </linearGradient>
    <linearGradient id="shine_cipher-sar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="card_cipher-sar">
      <rect width="180" height="252" rx="10"/>
    </clipPath>
    <filter id="glow_cipher-sar">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <g clip-path="url(#card_cipher-sar)">
    <rect width="180" height="252" fill="url(#bg_cipher-sar)"/>
    
    <!-- Art area -->
    <rect x="8" y="30" width="164" height="132" rx="4" fill="rgba(0,0,0,0.25)"/>
    <!-- Ciphermaniac dark tech -->
    <rect x="8" y="30" width="164" height="132" fill="#0a0f1a" rx="4"/>
    <!-- Matrix code bg -->
    <text x="20" y="52" font-size="7" fill="#00FF41" opacity="0.15" font-family="monospace">010011010</text>
    <text x="15" y="65" font-size="7" fill="#00FF41" opacity="0.15" font-family="monospace">110010110</text>
    <text x="25" y="78" font-size="7" fill="#00FF41" opacity="0.15" font-family="monospace">001101001</text>
    <text x="100" y="52" font-size="7" fill="#00FF41" opacity="0.15" font-family="monospace">11001011</text>
    <text x="105" y="65" font-size="7" fill="#00FF41" opacity="0.12" font-family="monospace">00110100</text>
    <!-- Lock/cipher device -->
    <rect x="58" y="72" width="64" height="58" rx="6" fill="#1a2340" stroke="#00BCD4" stroke-width="1.5"/>
    <circle cx="90" cy="88" r="14" fill="none" stroke="#00BCD4" stroke-width="2"/>
    <circle cx="90" cy="88" r="8" fill="#00BCD4" opacity="0.3"/>
    <!-- Keyhole -->
    <circle cx="90" cy="85" r="4" fill="#00BCD4"/>
    <rect x="87" y="88" width="6" height="9" rx="1" fill="#00BCD4"/>
    <!-- Circuit lines -->
    <line x1="62" y1="110" x2="78" y2="110" stroke="#00FF41" stroke-width="1" opacity="0.6"/>
    <line x1="102" y1="110" x2="118" y2="110" stroke="#00FF41" stroke-width="1" opacity="0.6"/>
    <line x1="62" y1="120" x2="118" y2="120" stroke="#00FF41" stroke-width="0.8" opacity="0.4"/>
    <!-- Shine overlay -->
    <rect x="8" y="30" width="164" height="132" fill="url(#shine_cipher-sar)" rx="4"/>
  </g>
  
  <!-- Card outer border -->
  <rect x="2" y="2" width="176" height="248" rx="10" fill="none" stroke="#C8B560" stroke-width="2.5"/>
  <rect x="5" y="5" width="170" height="242" rx="8" fill="none" stroke="#E8D584" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Name bar top -->
  <rect x="8" y="8" width="164" height="20" rx="3" fill="rgba(0,0,0,0.7)"/>
  <text x="12" y="22" font-size="9.5" fill="white" font-family="'Arial',sans-serif" font-weight="bold">Ciphermaniac's</text>
  
  <!-- Card number + rarity bottom right of art -->
  <rect x="100" y="156" width="68" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="166" y="167" font-size="8.5" fill="#00BCD4" font-family="'Share Tech Mono',monospace" text-anchor="end" font-weight="bold">SAR SAR</text>
  
  <!-- Set name bottom left of art -->
  <rect x="12" y="156" width="84" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="16" y="167" font-size="7.5" fill="#cccccc" font-family="'Arial',sans-serif">CN Main Set</text>
  
  <!-- Stats / text box area -->
  <rect x="8" y="174" width="164" height="70" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  
  <!-- CN text -->
  <text x="16" y="188" font-size="9" fill="#aaaaaa" font-family="'Arial',sans-serif">简体中文 独家</text>
  
  <!-- Rarity pip row -->
  <text x="90" y="234" font-size="9" fill="#00BCD4" text-anchor="middle" font-family="monospace" font-weight="bold">SAR</text>
  <circle cx="152" cy="230" r="4" fill="#00BCD4" opacity="0.8"/>
  <circle cx="158" cy="230" r="2.5" fill="#00BCD4" opacity="0.5"/>
  <circle cx="162" cy="230" r="1.5" fill="#00BCD4" opacity="0.3"/>
  
  <!-- Illustrator line if applicable -->
</svg>