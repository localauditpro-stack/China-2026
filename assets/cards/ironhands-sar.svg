<svg viewBox="0 0 180 252" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg_ironhands-sar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#4527A0"/>
    </linearGradient>
    <linearGradient id="shine_ironhands-sar" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="card_ironhands-sar">
      <rect width="180" height="252" rx="10"/>
    </clipPath>
    <filter id="glow_ironhands-sar">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <g clip-path="url(#card_ironhands-sar)">
    <rect width="180" height="252" fill="url(#bg_ironhands-sar)"/>
    
    <!-- Art area -->
    <rect x="8" y="30" width="164" height="132" rx="4" fill="rgba(0,0,0,0.25)"/>
    <!-- Iron Hands mechanical -->
    <rect x="8" y="30" width="164" height="132" fill="#0d1040" rx="4"/>
    <!-- Energy glow -->
    <circle cx="90" cy="96" r="45" fill="#1565C0" opacity="0.2"/>
    <!-- Iron Hands body -->
    <rect x="65" y="88" width="50" height="50" rx="4" fill="#1565C0"/>
    <!-- Head -->
    <rect x="72" y="72" width="36" height="30" rx="4" fill="#1976D2"/>
    <!-- Eyes/sensors -->
    <rect x="78" y="80" width="10" height="6" rx="2" fill="#00E5FF"/>
    <rect x="92" y="80" width="10" height="6" rx="2" fill="#00E5FF"/>
    <!-- Big iron arms -->
    <rect x="32" y="88" width="30" height="20" rx="4" fill="#1565C0"/>
    <rect x="118" y="88" width="30" height="20" rx="4" fill="#1565C0"/>
    <!-- Fists -->
    <rect x="28" y="102" width="24" height="20" rx="3" fill="#0D47A1"/>
    <rect x="128" y="102" width="24" height="20" rx="3" fill="#0D47A1"/>
    <!-- Energy lines -->
    <line x1="65" y1="113" x2="32" y2="108" stroke="#00E5FF" stroke-width="1.5"/>
    <line x1="115" y1="113" x2="148" y2="108" stroke="#00E5FF" stroke-width="1.5"/>
    <!-- Knuckles glow -->
    <circle cx="36" cy="118" r="4" fill="#00E5FF" opacity="0.7"/>
    <circle cx="144" cy="118" r="4" fill="#00E5FF" opacity="0.7"/>
    <!-- Shine overlay -->
    <rect x="8" y="30" width="164" height="132" fill="url(#shine_ironhands-sar)" rx="4"/>
  </g>
  
  <!-- Card outer border -->
  <rect x="2" y="2" width="176" height="248" rx="10" fill="none" stroke="#C8B560" stroke-width="2.5"/>
  <rect x="5" y="5" width="170" height="242" rx="8" fill="none" stroke="#E8D584" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Name bar top -->
  <rect x="8" y="8" width="164" height="20" rx="3" fill="rgba(0,0,0,0.7)"/>
  <text x="12" y="22" font-size="9.5" fill="white" font-family="'Arial',sans-serif" font-weight="bold">Iron Hands ex</text>
  
  <!-- Card number + rarity bottom right of art -->
  <rect x="100" y="156" width="68" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="166" y="167" font-size="8.5" fill="#00BCD4" font-family="'Share Tech Mono',monospace" text-anchor="end" font-weight="bold">SAR SAR</text>
  
  <!-- Set name bottom left of art -->
  <rect x="12" y="156" width="84" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="16" y="167" font-size="7.5" fill="#cccccc" font-family="'Arial',sans-serif">CN Main Set</text>
  
  <!-- Stats / text box area -->
  <rect x="8" y="174" width="164" height="70" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  
  <!-- CN text -->
  <text x="16" y="188" font-size="9" fill="#aaaaaa" font-family="'Arial',sans-serif">简体中文 独家</text>
  
  <!-- Rarity pip row -->
  <text x="90" y="234" font-size="9" fill="#00BCD4" text-anchor="middle" font-family="monospace" font-weight="bold">SAR</text>
  <circle cx="152" cy="230" r="4" fill="#00BCD4" opacity="0.8"/>
  <circle cx="158" cy="230" r="2.5" fill="#00BCD4" opacity="0.5"/>
  <circle cx="162" cy="230" r="1.5" fill="#00BCD4" opacity="0.3"/>
  
  <!-- Illustrator line if applicable -->
</svg>