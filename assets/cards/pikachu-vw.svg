<svg viewBox="0 0 180 252" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <linearGradient id="bg_pikachu-vw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </linearGradient>
    <linearGradient id="shine_pikachu-vw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.08"/>
    </linearGradient>
    <clipPath id="card_pikachu-vw">
      <rect width="180" height="252" rx="10"/>
    </clipPath>
    <filter id="glow_pikachu-vw">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Card background -->
  <g clip-path="url(#card_pikachu-vw)">
    <rect width="180" height="252" fill="url(#bg_pikachu-vw)"/>
    
    <!-- Art area -->
    <rect x="8" y="30" width="164" height="132" rx="4" fill="rgba(0,0,0,0.25)"/>
    <!-- VW Volkswagen collab -->
    <rect x="8" y="30" width="164" height="132" fill="#003087" rx="4"/>
    <!-- VW car silhouette -->
    <rect x="35" y="115" width="110" height="30" rx="8" fill="#1565C0"/>
    <ellipse cx="90" cy="108" rx="45" ry="22" fill="#1976D2"/>
    <!-- Windows -->
    <ellipse cx="72" cy="107" rx="16" ry="10" fill="#E3F2FD" opacity="0.8"/>
    <ellipse cx="108" cy="107" rx="16" ry="10" fill="#E3F2FD" opacity="0.8"/>
    <!-- Wheels -->
    <circle cx="55" cy="142" r="12" fill="#0D47A1"/>
    <circle cx="55" cy="142" r="6" fill="#BDBDBD"/>
    <circle cx="125" cy="142" r="12" fill="#0D47A1"/>
    <circle cx="125" cy="142" r="6" fill="#BDBDBD"/>
    <!-- VW logo on car -->
    <circle cx="90" cy="110" r="8" fill="white" opacity="0.9"/>
    <text x="90" y="113" font-size="7" fill="#003087" text-anchor="middle" font-family="sans-serif" font-weight="bold">VW</text>
    <!-- Small Pikachu on roof -->
    
    <!-- Pikachu body -->
    <ellipse cx="90" cy="90.5" rx="11.700000000000001" ry="9.1" fill="#FFD700"/>
    <!-- head -->
    <circle cx="90" cy="84" r="9.1" fill="#FFD700"/>
    <!-- ears -->
    <polygon points="84.8,76.2 80.9,67.1 88.7,74.9" fill="#FFD700"/>
    <polygon points="95.2,76.2 99.1,67.1 91.3,74.9" fill="#FFD700"/>
    <polygon points="84.8,74.9 82.2,68.4 87.4,73.6" fill="#1a1a1a"/>
    <polygon points="95.2,74.9 97.8,68.4 92.6,73.6" fill="#1a1a1a"/>
    <!-- cheeks -->
    <circle cx="83.5" cy="86.6" r="2.6" fill="#FF6B6B" opacity="0.8"/>
    <circle cx="96.5" cy="86.6" r="2.6" fill="#FF6B6B" opacity="0.8"/>
    <!-- eyes -->
    <circle cx="86.75" cy="82.7" r="1.625" fill="#1a1a1a"/>
    <circle cx="93.25" cy="82.7" r="1.625" fill="#1a1a1a"/>
    <!-- nose -->
    <ellipse cx="90" cy="85.3" rx="0.9750000000000001" ry="0.65" fill="#1a1a1a"/>
    <!-- tail lightning bolt -->
    <polygon points="101.7,86.6 108.2,81.4 104.3,84 110.8,77.5 101.7,82.7 105.6,80.1" fill="#FFD700" stroke="#E6B800" stroke-width="0.5"/>
    
    <!-- Electric sparks -->
    <text x="50" y="80" font-size="12" fill="#FFD700" opacity="0.8">⚡</text>
    <text x="120" y="80" font-size="12" fill="#FFD700" opacity="0.8">⚡</text>
    <!-- Shine overlay -->
    <rect x="8" y="30" width="164" height="132" fill="url(#shine_pikachu-vw)" rx="4"/>
  </g>
  
  <!-- Card outer border -->
  <rect x="2" y="2" width="176" height="248" rx="10" fill="none" stroke="#C8B560" stroke-width="2.5"/>
  <rect x="5" y="5" width="170" height="242" rx="8" fill="none" stroke="#E8D584" stroke-width="0.8" opacity="0.6"/>
  
  <!-- Name bar top -->
  <rect x="8" y="8" width="164" height="20" rx="3" fill="rgba(0,0,0,0.7)"/>
  <text x="12" y="22" font-size="9.5" fill="white" font-family="'Arial',sans-serif" font-weight="bold">Pikachu</text>
  
  <!-- Card number + rarity bottom right of art -->
  <rect x="100" y="156" width="68" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="166" y="167" font-size="8.5" fill="#FF4081" font-family="'Share Tech Mono',monospace" text-anchor="end" font-weight="bold">PROMO PROMO</text>
  
  <!-- Set name bottom left of art -->
  <rect x="12" y="156" width="84" height="16" rx="2" fill="rgba(0,0,0,0.6)"/>
  <text x="16" y="167" font-size="7.5" fill="#cccccc" font-family="'Arial',sans-serif">VW ID-3 Collab</text>
  
  <!-- Stats / text box area -->
  <rect x="8" y="174" width="164" height="70" rx="3" fill="rgba(255,255,255,0.07)" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
  
  <!-- CN text -->
  <text x="16" y="188" font-size="9" fill="#aaaaaa" font-family="'Arial',sans-serif">简体中文 独家</text>
  
  <!-- Rarity pip row -->
  <text x="90" y="234" font-size="9" fill="#FF4081" text-anchor="middle" font-family="monospace" font-weight="bold">PROMO</text>
  <circle cx="152" cy="230" r="4" fill="#FF4081" opacity="0.8"/>
  <circle cx="158" cy="230" r="2.5" fill="#FF4081" opacity="0.5"/>
  <circle cx="162" cy="230" r="1.5" fill="#FF4081" opacity="0.3"/>
  
  <!-- Illustrator line if applicable -->
</svg>